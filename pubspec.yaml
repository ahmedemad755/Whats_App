name: whatsapp
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  intl: ^0.19.0
  dartz: ^0.10.1
  get_it: ^7.7.0
  record: 5.0.0
  audioplayers: ^6.1.0
  path_provider: ^2.1.5
  emoji_picker_flutter: ^4.4.0
  flutter_svg: ^2.3.0
  camera: ^0.12.0+1
  camera_android: ^0.10.9+8
  permission_handler: ^12.0.0+1
  image_picker: ^1.2.2
  path: ^1.9.1
  file_picker: ^8.0.0

dependency_overrides:
  record_linux:
    path: packages/record_linux
  record_platform_interface: 1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
